name: Issue to PR with Codex

on:
  issues:
    types:
      - labeled

jobs:
  fix_with_codex:
    if: github.event.label.name == 'codex-ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      BRANCH_NAME: codex/issue-${{ github.event.issue.number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Prepare workspace
        run: |
          git switch -c "$BRANCH_NAME"
          rm -rf node_modules
          rm -f package-lock.json pnpm-lock.yaml yarn.lock

      - name: Generate patch with Codex
        id: codex_run
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is not configured." >&2
            exit 1
          fi

          KEY_SUFFIX="${OPENAI_API_KEY: -4}"
          echo "Using OPENAI_API_KEY (last 4 digits): ${KEY_SUFFIX}"

          PROMPT=$'${ISSUE_TITLE}\n\n${ISSUE_BODY}\n\n次の制約を厳守してください:\n- リポジトリルートで作業してください。\n- 自動生成された差分が空であれば何もコミットしないでください。\n- 変更内容に応じて `deno task fmt` / `deno task lint` / `deno task test` を実行してください。'

          codex exec --full-auto -c model_provider=openai -m gpt-4o-mini "$PROMPT"

          if git status --porcelain | grep -q .; then
            git add .
            git commit -m "fix: #$ISSUE_NUMBER $ISSUE_TITLE"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Codex CLI did not produce any changes. Skipping PR creation." >&2
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch
        if: steps.codex_run.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push -u origin "$BRANCH_NAME"

      - name: Create pull request
        if: steps.codex_run.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "fix: #$ISSUE_NUMBER $ISSUE_TITLE" \
            --body "Automated fix generated by Codex CLI." \
            --base main \
            --head "$BRANCH_NAME"
